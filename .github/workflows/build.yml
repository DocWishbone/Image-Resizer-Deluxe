# Trigger Update
name: Build and Release EXE

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Code auschecken
      uses: actions/checkout@v4

    - name: Python installieren
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Abhängigkeiten installieren
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller Pillow tkinterdnd2 pillow-heif

    - name: EXE erstellen
      run: python -m PyInstaller --noconsole --onefile --noupx --collect-all tkinterdnd2 --collect-all pillow_heif --collect-all PIL --hidden-import pillow_heif --hidden-import pillow_heif._pillow_heif --name "Image_Resizer_${{ github.ref_name }}" --icon="app_icon.ico" Resizer.pyw

    - name: Release erstellen
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: dist/*.exe
        tag_name: ${{ github.ref_name }}
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
